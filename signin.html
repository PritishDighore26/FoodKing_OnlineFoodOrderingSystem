<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FoodKing</title>
    <link rel="stylesheet" href="lspage.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="login-container">
        <a href="index.html" class="logologin">FoodKing.</a>
        <div class="signin">
            <h2 class="lh2">Sign Up</h2>
            <form action="" method="post">
                <input class="inputs" type="text" name="fname" id="fname" placeholder="First Name" required>
                <input class="inputs" type="text" name="lname" id="lname" placeholder="Last name" required>
                <input class="inputs" type="email" name="email" id="email" placeholder="xyz@gmail.com" required>
                <input class="inputs" type="password" name="pass" id="pass" placeholder="8+ characters" required>
                <input class="inputs" type="password" name="cpass" id="cpass" placeholder="Confirm password" required>
                <button type="submit" class="btn3" onclick="validateform()">Register</button>
                <p>
                    <input type="checkbox"> By continuing, I agree to the terms of <br>use & privacy policy.
                </p>
                <p>Already have an account? <a href="login.html" class="text-color">Login here</a></p>
            </form>
        </div>
    </div>
</body>

</html>
